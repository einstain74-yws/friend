name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # npm ci는 lock에 wasm 옵션 패키지(@emnapi/*)가 플랫폼마다 달라 실패할 수 있음
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Verify Supabase repository secrets
        run: |
          if [ -z "$VITE_SUPABASE_URL" ]; then
            echo '::error::VITE_SUPABASE_URL secret is empty. Add it under Repository — Settings — Secrets and variables — Actions.'
            exit 1
          fi
          if [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo '::error::VITE_SUPABASE_ANON_KEY secret is empty. Add it under Repository — Settings — Secrets and variables — Actions.'
            exit 1
          fi
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build
        env:
          VITE_BASE_PATH: /friend/
          # 저장소 기본: 클라우드 데이터는 Supabase만 (Firestore 경로 비활성화)
          VITE_DATA_BACKEND: supabase
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
